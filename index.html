<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0E1A" />
  <link rel="manifest" href="/content-studio/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Content Studio" />
  <link rel="apple-touch-icon" href="/content-studio/icons/icon-192.png" />
  <meta name="format-detection" content="telephone=no" />
  <title>Content Studio ✦</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; width: 100%; }
    body { background: #0F0E1A; font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    button { -webkit-user-select: none; user-select: none; }
    * { -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/content-studio/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
